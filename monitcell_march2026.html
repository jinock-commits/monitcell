
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:24px 20px 28px}
.lbl{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:4px}
.heading{font-size:20px;font-weight:500;color:var(--color-text-primary);margin-bottom:16px}
.cal-section{border:1.5px solid #222;border-radius:12px;padding:16px 16px 12px;margin-bottom:14px}
.week-header{display:grid;grid-template-columns:30px repeat(6,1fr);gap:4px;margin-bottom:6px}
.wh-cell{font-size:11px;font-weight:500;text-align:center;color:var(--color-text-secondary)}
.wh-cell.we{color:#FF1744}
.week-row{display:grid;grid-template-columns:30px repeat(6,1fr);gap:4px;margin-bottom:4px;align-items:center}
.week-lbl{font-size:10px;color:var(--color-text-secondary);text-align:right;padding-right:4px}
.day-cell{border-radius:7px;padding:6px 5px 5px;cursor:pointer;position:relative;min-height:58px;display:flex;flex-direction:column;justify-content:space-between;transition:outline .1s}
.day-cell:hover{outline:2px solid #555;outline-offset:0}
.day-cell.empty{background:transparent;cursor:default;min-height:58px}
.day-cell.empty:hover{outline:none}
.day-cell.holiday{background:#FFF3F3;border:0.5px solid #FFCDD2;cursor:default;min-height:58px}
.day-cell.holiday:hover{outline:none}
.day-num{font-size:10px;font-weight:500;line-height:1}
.day-util{font-size:15px;font-weight:500;line-height:1;text-align:center;margin:auto 0}
.holiday-label{font-size:9px;font-weight:500;color:#FF1744;text-align:center;line-height:1.3;margin:auto 0}
.day-counts{display:flex;gap:2px;justify-content:center}
.dc{font-size:8.5px;font-weight:500;border-radius:3px;padding:1px 3px}
.tooltip{position:absolute;background:#111;color:#fff;border-radius:7px;padding:8px 11px;font-size:12px;white-space:nowrap;z-index:20;pointer-events:none;opacity:0;transition:opacity .12s;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);line-height:1.7}
.tooltip.show{opacity:1}
.roster-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.roster-card{border:1.5px solid #222;border-radius:10px;padding:14px 16px}
.roster-title{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.roster-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px}
.main-badge{background:#FDECEA;color:#C0392B}
.sub-badge{background:#E8EAF6;color:#3949AB}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-name{font-size:12px;color:var(--color-text-primary);width:40px;flex-shrink:0;text-align:right}
.bar-track{flex:1;background:var(--color-background-secondary);border-radius:3px;height:10px;overflow:hidden}
.bar-fill-main{height:100%;border-radius:3px;background:#3F5185}
.bar-fill-sub{height:100%;border-radius:3px;background:#9FA8DA}
.bar-days{font-size:11px;color:var(--color-text-secondary);width:24px;flex-shrink:0;text-align:right}
.axis-row{display:flex;align-items:center;gap:10px;margin-top:6px;padding-top:6px;border-top:0.5px solid var(--color-border-tertiary)}

/* 마커 레이블: HTML 절대 위치, 고정 폰트 */
.legend-wrap{position:relative;margin-bottom:16px}
.marker-area{position:relative;width:100%;height:52px}
.marker-label{position:absolute;font-size:11px;font-weight:500;padding:3px 8px;border-radius:4px;white-space:nowrap;line-height:1.4;top:4px}
.marker-label.total{background:#F0F0F0;color:#666}
.marker-label.weekday{background:#EEF1F8;color:#3F5185}
.marker-line-svg{position:absolute;top:0;left:0;width:100%;height:52px;overflow:visible;pointer-events:none}
</style>

    <div id="lg-gradient-bar" style="width:100%;height:20px;border-radius:5px;position:relative;overflow:hidden"></div>
    <div style="display:flex;justify-content:space-between;margin-top:4px">
      <span style="font-size:10px;color:var(--color-text-secondary)">0%</span>
      <span style="font-size:10px;color:var(--color-text-secondary)">25%</span>
      <span style="font-size:10px;color:var(--color-text-secondary)">50%</span>
      <span style="font-size:10px;color:var(--color-text-secondary)">75%</span>
      <span style="font-size:10px;color:var(--color-text-secondary)">100%</span>
    </div>
  </div>

  <div class="cal-section">
    <div class="week-header">
      <div></div>
      <div class="wh-cell">월</div>
      <div class="wh-cell">화</div>
      <div class="wh-cell">수</div>
      <div class="wh-cell">목</div>
      <div class="wh-cell">금</div>
      <div class="wh-cell we">토</div>
    </div>
    <div id="cal-body"></div>
  </div>

  <div class="roster-grid">
    <div class="roster-card">
      <div class="roster-title">Main Operator <span class="roster-badge main-badge">7명</span></div>
      <div id="main-bars"></div>
    </div>
    <div class="roster-card">
      <div class="roster-title">Sub Operator <span class="roster-badge sub-badge">4명</span></div>
      <div id="sub-bars"></div>
    </div>
  </div>
</div>

<script>
function hmColor(u){
  if(u===undefined) return null;
  let r,g,b;
  if(u<=50){const t=u/50;r=Math.round(255+(202-255)*t);g=Math.round(255+(208-255)*t);b=Math.round(255+(209-255)*t);}
  else{const t=(u-50)/50;r=Math.round(202+(255-202)*t);g=Math.round(208+(23-208)*t);b=Math.round(209+(68-209)*t);}
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  const br=(r*299+g*587+b*114)/1000;
  const txt=br>170?'#1a1a2e':'#ffffff';
  const numCol=br>210?'#aaa':br>155?'rgba(30,30,50,0.38)':'rgba(255,255,255,0.55)';
  return{bg:`rgb(${r},${g},${b})`,txt,numCol};
}

const lgBar=document.getElementById('lg-gradient-bar');
for(let i=0;i<200;i++){
  const u=(i/200)*100;
  const c=hmColor(u);
  const s=document.createElement('div');
  s.style.cssText=`position:absolute;left:${(i/200)*100}%;width:${100/200+0.5}%;height:100%;background:${c.bg}`;
  lgBar.appendChild(s);
}

const WEEKDAY_AVG=49.7;
const TOTAL_AVG=44.6;

function positionMarkers(){
  const area=document.getElementById('marker-area');
  const W=area.offsetWidth;
  const H=52;

  const wdX=(WEEKDAY_AVG/100)*W;
  const ttX=(TOTAL_AVG/100)*W;

  const lblTotal=document.getElementById('lbl-total');
  const lblWeekday=document.getElementById('lbl-weekday');
  const svg=document.getElementById('line-svg');

  const ttW=lblTotal.offsetWidth||110;
  const wdW=lblWeekday.offsetWidth||110;

  // 전체 평균: 레이블 왼쪽에 배치 (ttX 기준)
  const ttLX=Math.max(ttX-ttW-4, 0);
  lblTotal.style.left=ttLX+'px';
  lblTotal.style.top='4px';

  // 평일 평균: 레이블 오른쪽에 배치 (wdX 기준)
  const wdLX=Math.min(wdX+4, W-wdW);
  lblWeekday.style.left=wdLX+'px';
  lblWeekday.style.top='4px';

  // 꺾은선 SVG (픽셀 절대값, viewBox 없이)
  const ttLabelMidX=ttLX+ttW*0.5;
  const wdLabelMidX=wdLX+wdW*0.35;
  const kneeY=24;

  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.innerHTML=`
    <polyline points="${ttLabelMidX},${kneeY} ${ttX},${kneeY} ${ttX},${H}" fill="none" stroke="#999" stroke-width="1.3"/>
    <polygon points="${ttX},${H} ${ttX-3},${H-5} ${ttX+3},${H-5}" fill="#999"/>
    <polyline points="${wdLabelMidX},${kneeY} ${wdX},${kneeY} ${wdX},${H}" fill="none" stroke="#3F5185" stroke-width="1.3"/>
    <polygon points="${wdX},${H} ${wdX-3},${H-5} ${wdX+3},${H-5}" fill="#3F5185"/>
  `;
}

setTimeout(positionMarkers, 100);
window.addEventListener('resize', positionMarkers);

// 캘린더 데이터
const calData={
  '3/3':{main:4,sub:2,weekend:false},'3/4':{main:4,sub:2,weekend:false},'3/5':{main:5,sub:2,weekend:false},
  '3/6':{main:3,sub:3,weekend:false},'3/7':{main:1,sub:0,weekend:true},
  '3/9':{main:3,sub:1,weekend:false},'3/10':{main:4,sub:4,weekend:false},'3/11':{main:6,sub:2,weekend:false},
  '3/12':{main:4,sub:4,weekend:false},'3/13':{main:3,sub:4,weekend:false},'3/14':{main:1,sub:0,weekend:true},
  '3/16':{main:3,sub:3,weekend:false},'3/17':{main:4,sub:5,weekend:false},'3/18':{main:5,sub:4,weekend:false},
  '3/19':{main:4,sub:3,weekend:false},'3/20':{main:4,sub:2,weekend:false},'3/21':{main:2,sub:0,weekend:true},
  '3/23':{main:3,sub:3,weekend:false},'3/24':{main:4,sub:3,weekend:false},'3/25':{main:3,sub:0,weekend:false},
  '3/26':{main:2,sub:2,weekend:false},'3/27':{main:1,sub:0,weekend:false},'3/28':{main:1,sub:0,weekend:true},
  '3/30':{main:5,sub:2,weekend:false},'3/31':{main:3,sub:3,weekend:false},
};
Object.values(calData).forEach(d=>{d.util=Math.round(d.main/7*100);});

const mainMembers=[
  {name:'서예빈',days:14},{name:'이송은',days:14},{name:'이선하',days:13},
  {name:'김소정',days:12},{name:'황이현',days:12},{name:'김현지',days:10},{name:'이동환',days:7}
];
const subMembers=[
  {name:'이영은',days:14},{name:'김채연',days:12},{name:'이의정',days:12},{name:'김태윤',days:8}
];
const MAX_DAYS=26;

function renderBars(containerId,members,fillClass){
  const container=document.getElementById(containerId);
  members.forEach(m=>{
    const pct=Math.round((m.days/MAX_DAYS)*100);
    const row=document.createElement('div');
    row.className='bar-row';
    row.innerHTML=`<div class="bar-name">${m.name}</div>
      <div class="bar-track"><div class="${fillClass}" style="width:${pct}%"></div></div>
      <div class="bar-days">${m.days}일</div>`;
    container.appendChild(row);
  });
  const ax=document.createElement('div');
  ax.className='axis-row';
  ax.innerHTML=`<div style="width:40px;flex-shrink:0"></div><div style="flex:1;display:flex;justify-content:space-between"><span style="font-size:10px;color:var(--color-text-secondary)">0일</span><span style="font-size:10px;color:var(--color-text-secondary)">${MAX_DAYS}일</span></div><div style="width:24px"></div>`;
  container.appendChild(ax);
}
renderBars('main-bars',mainMembers,'bar-fill-main');
renderBars('sub-bars',subMembers,'bar-fill-sub');

const weeks=[
  ['3/2','3/3','3/4','3/5','3/6','3/7'],
  ['3/9','3/10','3/11','3/12','3/13','3/14'],
  ['3/16','3/17','3/18','3/19','3/20','3/21'],
  ['3/23','3/24','3/25','3/26','3/27','3/28'],
  ['3/30','3/31','','','',''],
];
const wlabels=['1주','2주','3주','4주','5주'];
const cal=document.getElementById('cal-body');

weeks.forEach((week,wi)=>{
  const row=document.createElement('div');
  row.className='week-row';
  const wl=document.createElement('div');
  wl.className='week-lbl';
  wl.textContent=wlabels[wi];
  row.appendChild(wl);
  week.forEach((day,di)=>{
    const cell=document.createElement('div');
    const isSat=(di===5);
    if(day==='3/2'){
      cell.className='day-cell holiday';
      const dateEl=document.createElement('div');dateEl.className='day-num';dateEl.style.color='#FF1744';dateEl.textContent='3/2';
      const labelEl=document.createElement('div');labelEl.className='holiday-label';labelEl.textContent='대체\n공휴일';
      cell.appendChild(dateEl);cell.appendChild(labelEl);cell.appendChild(document.createElement('div'));
      row.appendChild(cell);return;
    }
    if(!day){cell.className='day-cell empty';row.appendChild(cell);return;}
    const d=calData[day];
    cell.className='day-cell';
    const theme=hmColor(d?d.util:undefined);
    if(theme){cell.style.background=theme.bg;if(isSat)cell.style.outline='1.5px dashed rgba(0,0,0,0.15)';}
    else{cell.style.background='var(--color-background-secondary)';cell.style.border='0.5px solid var(--color-border-tertiary)';}
    const tip=document.createElement('div');tip.className='tooltip';
    if(d){
      const wkTag=isSat?'<span style="color:#FAC775"> (토요일)</span>':'';
      tip.innerHTML=`<span style="opacity:.55;font-size:11px">${day}${wkTag}</span><br>가용율 <strong>${d.util}%</strong> (Main ${d.main}/7)<br><span style="color:#f09595">Main ${d.main}명</span> &nbsp;<span style="color:#9FA8DA">Sub ${d.sub}명</span>`;
    } else {tip.textContent='비운영일';}
    const dateEl=document.createElement('div');dateEl.className='day-num';dateEl.style.color=theme?theme.numCol:'var(--color-text-secondary)';dateEl.textContent=day;
    if(isSat)dateEl.style.fontStyle='italic';
    const utilEl=document.createElement('div');utilEl.className='day-util';utilEl.style.color=theme?theme.txt:'var(--color-text-secondary)';utilEl.textContent=d?d.util+'%':'—';
    const bottom=document.createElement('div');
    if(d){
      const counts=document.createElement('div');counts.className='day-counts';
      ['M'+d.main,'S'+d.sub].forEach(t=>{
        const s=document.createElement('span');s.className='dc';
        s.style.cssText='background:rgba(0,0,0,0.09);color:'+(theme?theme.txt:'#333');s.textContent=t;counts.appendChild(s);
      });bottom.appendChild(counts);
    }
    cell.appendChild(tip);cell.appendChild(dateEl);cell.appendChild(utilEl);cell.appendChild(bottom);
    cell.addEventListener('mouseenter',()=>tip.classList.add('show'));
    cell.addEventListener('mouseleave',()=>tip.classList.remove('show'));
    row.appendChild(cell);
  });
  cal.appendChild(row);
});
</script>
